server:
  port: 8081

spring:
  application:
    name: farmer-service
  datasource:
    url: jdbc:mysql://localhost:3306/farmconnect_farmer_db?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    auditing:
      enabled: true
